<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8DFD0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>

  <!-- Decorative corners -->
  <circle cx="100" cy="100" r="50" fill="#B8956A" opacity="0.06"/>
  <circle cx="1100" cy="500" r="45" fill="#C4A265" opacity="0.07"/>

  <!-- Clipboard structure -->
  <!-- Clip at top -->
  <rect x="380" y="120" width="80" height="25" fill="#8B7D6B" opacity="0.65" rx="3"/>
  <!-- Metal shine on clip -->
  <rect x="385" y="125" width="70" height="12" fill="#D4C5A9" opacity="0.25" rx="2"/>

  <!-- Clipboard board -->
  <rect x="320" y="145" width="560" height="350" fill="#D4C5A9" opacity="0.4" rx="6"/>
  <!-- Board border -->
  <rect x="320" y="145" width="560" height="350" fill="none" stroke="#8B7D6B" stroke-width="3" opacity="0.6" rx="6"/>

  <!-- Task items with checkmarks -->
  <!-- Item 1 -->
  <g>
    <!-- Checkbox -->
    <rect x="360" y="180" width="22" height="22" fill="none" stroke="#B8956A" stroke-width="2" opacity="0.7" rx="2"/>
    <!-- Checkmark 1 -->
    <path d="M 368 193 L 373 200 L 382 185" fill="none" stroke="#C4A265" stroke-width="2.5" opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Task text -->
    <line x1="400" y1="185" x2="550" y2="185" stroke="#B8956A" stroke-width="2" opacity="0.6"/>
    <line x1="400" y1="197" x2="520" y2="197" stroke="#B8956A" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Item 2 -->
  <g>
    <!-- Checkbox -->
    <rect x="360" y="235" width="22" height="22" fill="none" stroke="#B8956A" stroke-width="2" opacity="0.7" rx="2"/>
    <!-- Checkmark 2 -->
    <path d="M 368 248 L 373 255 L 382 240" fill="none" stroke="#C4A265" stroke-width="2.5" opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Task text -->
    <line x1="400" y1="240" x2="560" y2="240" stroke="#B8956A" stroke-width="2" opacity="0.6"/>
    <line x1="400" y1="252" x2="530" y2="252" stroke="#B8956A" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Item 3 -->
  <g>
    <!-- Checkbox -->
    <rect x="360" y="290" width="22" height="22" fill="none" stroke="#B8956A" stroke-width="2" opacity="0.7" rx="2"/>
    <!-- Checkmark 3 -->
    <path d="M 368 303 L 373 310 L 382 295" fill="none" stroke="#C4A265" stroke-width="2.5" opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Task text -->
    <line x1="400" y1="295" x2="540" y2="295" stroke="#B8956A" stroke-width="2" opacity="0.6"/>
    <line x1="400" y1="307" x2="510" y2="307" stroke="#B8956A" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Item 4 -->
  <g>
    <!-- Checkbox -->
    <rect x="360" y="345" width="22" height="22" fill="none" stroke="#B8956A" stroke-width="2" opacity="0.7" rx="2"/>
    <!-- Checkmark 4 -->
    <path d="M 368 358 L 373 365 L 382 350" fill="none" stroke="#C4A265" stroke-width="2.5" opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Task text -->
    <line x1="400" y1="350" x2="570" y2="350" stroke="#B8956A" stroke-width="2" opacity="0.6"/>
    <line x1="400" y1="362" x2="540" y2="362" stroke="#B8956A" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Item 5 -->
  <g>
    <!-- Checkbox -->
    <rect x="360" y="400" width="22" height="22" fill="none" stroke="#B8956A" stroke-width="2" opacity="0.7" rx="2"/>
    <!-- Checkmark 5 -->
    <path d="M 368 413 L 373 420 L 382 405" fill="none" stroke="#C4A265" stroke-width="2.5" opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Task text -->
    <line x1="400" y1="405" x2="550" y2="405" stroke="#B8956A" stroke-width="2" opacity="0.6"/>
    <line x1="400" y1="417" x2="520" y2="417" stroke="#B8956A" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Progress indicator - rightmost section -->
  <!-- Gear 1 - larger, top -->
  <g transform="translate(800, 220)" opacity="0.6">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#B8956A" stroke-width="3"/>
    <!-- Teeth -->
    <g stroke="#B8956A" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-45" x2="0" y2="-55"/>
      <line x1="32" y1="-25" x2="38" y2="-33"/>
      <line x1="45" y1="0" x2="55" y2="0"/>
      <line x1="32" y1="25" x2="38" y2="33"/>
      <line x1="0" y1="45" x2="0" y2="55"/>
      <line x1="-32" y1="25" x2="-38" y2="33"/>
      <line x1="-45" y1="0" x2="-55" y2="0"/>
      <line x1="-32" y1="-25" x2="-38" y2="-33"/>
    </g>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="#B8956A"/>
  </g>

  <!-- Gear 2 - smaller, bottom right -->
  <g transform="translate(900, 330)" opacity="0.5">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#C4A265" stroke-width="2.5"/>
    <!-- Teeth -->
    <g stroke="#C4A265" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-32" x2="0" y2="-40"/>
      <line x1="23" y1="-18" x2="28" y2="-24"/>
      <line x1="32" y1="0" x2="40" y2="0"/>
      <line x1="23" y1="18" x2="28" y2="24"/>
      <line x1="0" y1="32" x2="0" y2="40"/>
      <line x1="-23" y1="18" x2="-28" y2="24"/>
      <line x1="-32" y1="0" x2="-40" y2="0"/>
      <line x1="-23" y1="-18" x2="-28" y2="-24"/>
    </g>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3.5" fill="#C4A265"/>
  </g>

  <!-- Connection line between gears -->
  <path d="M 835 240 Q 860 280 875 310" fill="none" stroke="#D4C5A9" stroke-width="2" opacity="0.25" stroke-linecap="round"/>

  <!-- Percentage complete indicator -->
  <g transform="translate(800, 420)">
    <!-- Progress ring -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#D4C5A9" stroke-width="3" opacity="0.2"/>
    <!-- Completed arc -->
    <path d="M 40 0 A 40 40 0 0 1 -28.28 28.28" fill="none" stroke="#C4A265" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    <!-- Percentage text suggestion -->
    <text x="0" y="5" font-size="28" font-family="serif" fill="#B8956A" opacity="0.5" text-anchor="middle">85%</text>
  </g>
</svg>