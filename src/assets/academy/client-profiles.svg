<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8DFD0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4A265;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8956A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>

  <!-- Decorative corner elements -->
  <circle cx="80" cy="80" r="40" fill="#B8956A" opacity="0.1"/>
  <circle cx="1120" cy="520" r="50" fill="#C4A265" opacity="0.08"/>

  <!-- Silhouette group 1 - left -->
  <g transform="translate(150, 200)">
    <ellipse cx="0" cy="-40" rx="22" ry="28" fill="#B8956A" opacity="0.85"/>
    <path d="M -20 0 Q -25 40 -15 80 L -5 80 Q -15 40 0 0 Z" fill="#B8956A" opacity="0.85"/>
    <path d="M 20 0 Q 25 40 15 80 L 5 80 Q 15 40 0 0 Z" fill="#B8956A" opacity="0.85"/>
    <rect x="-18" y="0" width="15" height="50" fill="#B8956A" opacity="0.85"/>
    <rect x="3" y="0" width="15" height="50" fill="#B8956A" opacity="0.85"/>
  </g>

  <!-- Silhouette group 2 - center-left -->
  <g transform="translate(350, 180)">
    <ellipse cx="0" cy="-38" rx="24" ry="30" fill="#C4A265" opacity="0.8"/>
    <path d="M -20 0 Q -28 50 -12 85 L 0 85 Q -16 50 -5 0 Z" fill="#C4A265" opacity="0.8"/>
    <path d="M 20 0 Q 28 50 12 85 L 0 85 Q 16 50 5 0 Z" fill="#C4A265" opacity="0.8"/>
    <ellipse cx="-16" cy="8" rx="8" ry="35" fill="#C4A265" opacity="0.8" transform="rotate(-15 -16 8)"/>
    <ellipse cx="16" cy="8" rx="8" ry="35" fill="#C4A265" opacity="0.8" transform="rotate(15 16 8)"/>
  </g>

  <!-- Silhouette group 3 - center -->
  <g transform="translate(600, 150)">
    <ellipse cx="0" cy="-42" rx="26" ry="32" fill="#8B7D6B" opacity="0.9"/>
    <path d="M -22 0 Q -32 55 -10 90 L 2 90 Q -20 55 -8 0 Z" fill="#8B7D6B" opacity="0.9"/>
    <path d="M 22 0 Q 32 55 10 90 L -2 90 Q 20 55 8 0 Z" fill="#8B7D6B" opacity="0.9"/>
    <rect x="-20" y="0" width="16" height="55" fill="#8B7D6B" opacity="0.9"/>
    <rect x="4" y="0" width="16" height="55" fill="#8B7D6B" opacity="0.9"/>
  </g>

  <!-- Silhouette group 4 - center-right -->
  <g transform="translate(800, 190)">
    <ellipse cx="0" cy="-36" rx="20" ry="26" fill="#C4A265" opacity="0.75"/>
    <path d="M -18 0 Q -24 45 -8 80 L 4 80 Q -12 45 0 0 Z" fill="#C4A265" opacity="0.75"/>
    <path d="M 18 0 Q 24 45 8 80 L -4 80 Q 12 45 0 0 Z" fill="#C4A265" opacity="0.75"/>
    <ellipse cx="-14" cy="5" rx="7" ry="32" fill="#C4A265" opacity="0.75" transform="rotate(-20 -14 5)"/>
    <ellipse cx="14" cy="5" rx="7" ry="32" fill="#C4A265" opacity="0.75" transform="rotate(20 14 5)"/>
  </g>

  <!-- Silhouette group 5 - right -->
  <g transform="translate(1000, 220)">
    <ellipse cx="0" cy="-35" rx="21" ry="27" fill="#B8956A" opacity="0.82"/>
    <path d="M -18 0 Q -26 42 -10 78 L 2 78 Q -14 42 -5 0 Z" fill="#B8956A" opacity="0.82"/>
    <path d="M 18 0 Q 26 42 10 78 L -2 78 Q 14 42 5 0 Z" fill="#B8956A" opacity="0.82"/>
    <rect x="-17" y="0" width="14" height="48" fill="#B8956A" opacity="0.82"/>
    <rect x="3" y="0" width="14" height="48" fill="#B8956A" opacity="0.82"/>
  </g>

  <!-- Connecting subtle lines - suggesting network/harmony -->
  <line x1="170" y1="240" x2="330" y2="220" stroke="#C4A265" stroke-width="1.5" opacity="0.25" stroke-dasharray="5,5"/>
  <line x1="370" y1="215" x2="570" y2="190" stroke="#B8956A" stroke-width="1.5" opacity="0.25" stroke-dasharray="5,5"/>
  <line x1="630" y1="185" x2="770" y2="220" stroke="#C4A265" stroke-width="1.5" opacity="0.25" stroke-dasharray="5,5"/>
  <line x1="820" y1="245" x2="980" y2="260" stroke="#B8956A" stroke-width="1.5" opacity="0.25" stroke-dasharray="5,5"/>

  <!-- Accent dots at connection points -->
  <circle cx="170" cy="240" r="3" fill="#B8956A" opacity="0.3"/>
  <circle cx="330" cy="220" r="3" fill="#B8956A" opacity="0.3"/>
  <circle cx="570" cy="190" r="3" fill="#B8956A" opacity="0.3"/>
  <circle cx="820" cy="245" r="3" fill="#B8956A" opacity="0.3"/>
  <circle cx="980" cy="260" r="3" fill="#B8956A" opacity="0.3"/>
</svg>