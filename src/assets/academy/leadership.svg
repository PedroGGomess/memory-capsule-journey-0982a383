<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8DFD0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>

  <!-- Decorative corners -->
  <circle cx="80" cy="450" r="50" fill="#B8956A" opacity="0.06"/>
  <circle cx="1120" cy="120" r="45" fill="#C4A265" opacity="0.07"/>

  <!-- Central leader figure - slightly elevated/forward -->
  <g transform="translate(400, 200)">
    <!-- Head -->
    <ellipse cx="0" cy="-45" rx="26" ry="32" fill="#B8956A" opacity="0.85"/>
    <!-- Upper body -->
    <path d="M -24 0 Q -30 50 -8 90 L 8 90 Q 30 50 24 0 Z" fill="#B8956A" opacity="0.85"/>
    <!-- Left arm - extended, guiding -->
    <ellipse cx="-45" cy="20" rx="10" ry="45" fill="#B8956A" opacity="0.8" transform="rotate(-30 -45 20)"/>
    <!-- Right arm - confident -->
    <ellipse cx="45" cy="20" rx="10" ry="45" fill="#B8956A" opacity="0.8" transform="rotate(20 45 20)"/>
    <!-- Legs -->
    <ellipse cx="-12" cy="100" rx="8" ry="35" fill="#B8956A" opacity="0.85"/>
    <ellipse cx="12" cy="100" rx="8" ry="35" fill="#B8956A" opacity="0.85"/>
  </g>

  <!-- Team member 1 - left, looking toward leader -->
  <g transform="translate(200, 280)">
    <!-- Head -->
    <ellipse cx="0" cy="-35" rx="20" ry="25" fill="#C4A265" opacity="0.75"/>
    <!-- Body -->
    <path d="M -18 0 Q -22 35 -6 70 L 6 70 Q 22 35 18 0 Z" fill="#C4A265" opacity="0.75"/>
    <!-- Arms -->
    <ellipse cx="-32" cy="15" rx="8" ry="35" fill="#C4A265" opacity="0.7" transform="rotate(-25 -32 15)"/>
    <ellipse cx="32" cy="15" rx="8" ry="35" fill="#C4A265" opacity="0.7" transform="rotate(25 32 15)"/>
  </g>

  <!-- Team member 2 - right side, mirrored -->
  <g transform="translate(600, 300)">
    <!-- Head -->
    <ellipse cx="0" cy="-35" rx="20" ry="25" fill="#8B7D6B" opacity="0.8"/>
    <!-- Body -->
    <path d="M -18 0 Q -22 35 -6 70 L 6 70 Q 22 35 18 0 Z" fill="#8B7D6B" opacity="0.8"/>
    <!-- Arms -->
    <ellipse cx="-32" cy="15" rx="8" ry="35" fill="#8B7D6B" opacity="0.75" transform="rotate(-25 -32 15)"/>
    <ellipse cx="32" cy="15" rx="8" ry="35" fill="#8B7D6B" opacity="0.75" transform="rotate(25 32 15)"/>
  </g>

  <!-- Team member 3 - far right -->
  <g transform="translate(800, 320)">
    <!-- Head -->
    <ellipse cx="0" cy="-33" rx="19" ry="24" fill="#C4A265" opacity="0.7"/>
    <!-- Body -->
    <path d="M -16 0 Q -20 32 -5 65 L 5 65 Q 20 32 16 0 Z" fill="#C4A265" opacity="0.7"/>
    <!-- Arms -->
    <ellipse cx="-30" cy="12" rx="7" ry="32" fill="#C4A265" opacity="0.65" transform="rotate(-25 -30 12)"/>
    <ellipse cx="30" cy="12" rx="7" ry="32" fill="#C4A265" opacity="0.65" transform="rotate(25 30 12)"/>
  </g>

  <!-- Team member 4 - far left back -->
  <g transform="translate(100, 320)">
    <!-- Head -->
    <ellipse cx="0" cy="-30" rx="17" ry="22" fill="#B8956A" opacity="0.65"/>
    <!-- Body -->
    <path d="M -15 0 Q -18 30 -4 60 L 4 60 Q 18 30 15 0 Z" fill="#B8956A" opacity="0.65"/>
    <!-- Arms -->
    <ellipse cx="-28" cy="10" rx="6.5" ry="30" fill="#B8956A" opacity="0.6" transform="rotate(-25 -28 10)"/>
    <ellipse cx="28" cy="10" rx="6.5" ry="30" fill="#B8956A" opacity="0.6" transform="rotate(25 28 10)"/>
  </g>

  <!-- Connecting lines - suggesting communication and unity -->
  <!-- From leader to team member 1 -->
  <path d="M 380 280 Q 350 300 250 350" fill="none" stroke="#C4A265" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  <!-- From leader to team member 2 -->
  <path d="M 420 280 Q 500 300 600 360" fill="none" stroke="#B8956A" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  <!-- From leader to team member 3 -->
  <path d="M 450 290 Q 650 320 800 370" fill="none" stroke="#C4A265" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <!-- From leader to team member 4 -->
  <path d="M 360 290 Q 200 320 120 360" fill="none" stroke="#B8956A" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

  <!-- Accent connection points -->
  <circle cx="380" cy="280" r="4" fill="#C4A265" opacity="0.3"/>
  <circle cx="420" cy="280" r="4" fill="#B8956A" opacity="0.3"/>
  <circle cx="250" cy="350" r="3" fill="#C4A265" opacity="0.25"/>
  <circle cx="600" cy="360" r="3" fill="#B8956A" opacity="0.25"/>
  <circle cx="800" cy="370" r="3" fill="#C4A265" opacity="0.2"/>
  <circle cx="120" cy="360" r="3" fill="#B8956A" opacity="0.2"/>

  <!-- Subtle lines above figures - suggesting vision/direction -->
  <path d="M 350 140 Q 400 100 450 140" fill="none" stroke="#D4C5A9" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M 550 160 Q 600 120 650 160" fill="none" stroke="#D4C5A9" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
</svg>