<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8DFD0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="planeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4A265;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8956A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>

  <!-- Decorative corner circles -->
  <circle cx="80" cy="450" r="50" fill="#B8956A" opacity="0.07"/>
  <circle cx="1120" cy="150" r="55" fill="#C4A265" opacity="0.06"/>

  <!-- Airplane in elegant lines -->
  <!-- Fuselage (body) -->
  <ellipse cx="600" cy="250" rx="150" ry="32" fill="url(#planeGradient)" opacity="0.8"/>

  <!-- Cockpit - pointed nose -->
  <path d="M 750 250 L 800 240 L 800 260 Z" fill="url(#planeGradient)" opacity="0.85"/>

  <!-- Tail section -->
  <path d="M 450 250 L 420 250 L 425 235 L 425 265 Z" fill="#B8956A" opacity="0.7"/>

  <!-- Wings - extended and elegant -->
  <ellipse cx="600" cy="250" rx="200" ry="18" fill="#C4A265" opacity="0.65" transform="rotate(-8 600 250)"/>

  <!-- Wing highlights -->
  <ellipse cx="600" cy="245" rx="190" ry="12" fill="#D4C5A9" opacity="0.3" transform="rotate(-8 600 245)"/>

  <!-- Tail fin - vertical stabilizer -->
  <path d="M 440 250 L 430 180 L 450 185 Z" fill="#8B7D6B" opacity="0.6"/>
  <path d="M 440 250 L 430 320 L 450 315 Z" fill="#8B7D6B" opacity="0.5"/>

  <!-- Landing gear - subtle suggestion -->
  <line x1="570" y1="282" x2="570" y2="340" stroke="#B8956A" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <line x1="630" y1="282" x2="630" y2="340" stroke="#B8956A" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <ellipse cx="570" cy="345" rx="12" ry="8" fill="#8B7D6B" opacity="0.5"/>
  <ellipse cx="630" cy="345" rx="12" ry="8" fill="#8B7D6B" opacity="0.5"/>

  <!-- Wind/motion lines suggesting travel and movement -->
  <path d="M 200 220 Q 250 215 320 220" fill="none" stroke="#C4A265" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <path d="M 180 260 Q 230 255 300 260" fill="none" stroke="#B8956A" stroke-width="2.5" opacity="0.35" stroke-linecap="round"/>
  <path d="M 210 310 Q 260 305 330 310" fill="none" stroke="#C4A265" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- Trail lines from tail -->
  <path d="M 420 240 Q 350 235 280 240" fill="none" stroke="#D4C5A9" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  <path d="M 420 260 Q 350 265 280 260" fill="none" stroke="#D4C5A9" stroke-width="2" opacity="0.25" stroke-linecap="round"/>

  <!-- Destination marker - subtle circle -->
  <circle cx="920" cy="280" r="25" fill="none" stroke="#B8956A" stroke-width="3" opacity="0.4"/>
  <circle cx="920" cy="280" r="30" fill="none" stroke="#C4A265" stroke-width="1.5" opacity="0.25"/>

  <!-- Small decorative altitude lines -->
  <line x1="100" y1="350" x2="150" y2="350" stroke="#C4A265" stroke-width="1.5" opacity="0.2"/>
  <line x1="100" y1="370" x2="180" y2="370" stroke="#B8956A" stroke-width="1.5" opacity="0.15"/>
</svg>